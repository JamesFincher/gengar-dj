services:
  gengar-dj:
    image: ghcr.io/jamesfincher/gengar-dj:latest
    container_name: gengar-dj
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
