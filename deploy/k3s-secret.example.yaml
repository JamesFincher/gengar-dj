# ─── Gengar DJ — k3s Secret (template) ──────────────────────────
# Create from this template:
#   kubectl create secret generic gengar-dj-secrets \
#     --namespace gengar-lab \
#     --from-literal=DISCORD_BOT_TOKEN='your-token-here' \
#     --from-literal=HERMES_WEBHOOK_SECRET='your-webhook-secret' \
#     --from-literal=R2_ACCOUNT_ID='your-r2-account-id' \
#     --from-literal=R2_ACCESS_KEY_ID='your-r2-access-key-id' \
#     --from-literal=R2_SECRET_ACCESS_KEY='your-r2-secret-access-key' \
#     --from-literal=R2_BUCKET_NAME='your-r2-bucket-name' \
#     --from-literal=R2_PUBLIC_URL='https://your-public-domain-or-r2-dev-url.com'
#
# NEVER commit this file with real secrets.
---
apiVersion: v1
kind: Secret
metadata:
  name: gengar-dj-secrets
  namespace: gengar-lab
type: Opaque
stringData:
  DISCORD_BOT_TOKEN: "change-me"
  HERMES_WEBHOOK_SECRET: "change-me"
  R2_ACCOUNT_ID: "change-me"
  R2_ACCESS_KEY_ID: "change-me"
  R2_SECRET_ACCESS_KEY: "change-me"
  R2_BUCKET_NAME: "change-me"
  R2_PUBLIC_URL: ""
