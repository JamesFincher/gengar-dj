# ─── Gengar DJ — k3s Deployment ─────────────────────────────────
# Runs the Discord bot with a Tailscale sidecar for MagicDNS access.
# The bot is fully stateless and streams all audio directly from Cloudflare R2!
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gengar-dj
  namespace: gengar-lab
  labels:
    app: gengar-dj
spec:
  replicas: 1
  strategy:
    type: Recreate  # only one voice connection possible at a time
  selector:
    matchLabels:
      app: gengar-dj
  template:
    metadata:
      labels:
        app: gengar-dj
        tailscale.com/proxy: "true"
    spec:
      # Pin to gengar-claw-01 so we can reach the Hermes webhook on the host
      nodeSelector:
        kubernetes.io/hostname: gengar-claw-01

      containers:
        # ── Tailscale sidecar container ────────────────────────
        - name: tailscale
          image: tailscale/tailscale:stable
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-operator
                  key: TS_AUTHKEY
            - name: TS_HOSTNAME
              value: "gengar-dj"
            - name: TS_KUBE_SECRET
              value: "gengar-dj-state"
            - name: TS_USERSPACE
              value: "false"
          securityContext:
            privileged: true

        # ── Main bot container ────────────────────────────────
        - name: bot
          image: ghcr.io/jamesfincher/gengar-dj:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: api
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gengar-dj-secrets
                  key: DISCORD_BOT_TOKEN
            - name: HERMES_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: gengar-dj-secrets
                  key: HERMES_WEBHOOK_SECRET
            
            # Cloudflare R2 Credentials (from Secret)
            - name: R2_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: gengar-dj-secrets
                  key: R2_ACCOUNT_ID
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: gengar-dj-secrets
                  key: R2_ACCESS_KEY_ID
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: gengar-dj-secrets
                  key: R2_SECRET_ACCESS_KEY
            - name: R2_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: gengar-dj-secrets
                  key: R2_BUCKET_NAME
            - name: R2_PUBLIC_URL
              valueFrom:
                secretKeyRef:
                  name: gengar-dj-secrets
                  key: R2_PUBLIC_URL
                  optional: true

            - name: HERMES_WEBHOOK_URL
              valueFrom:
                configMapKeyRef:
                  name: gengar-dj-config
                  key: HERMES_WEBHOOK_URL
            - name: BOT_API_HOST
              valueFrom:
                configMapKeyRef:
                  name: gengar-dj-config
                  key: BOT_API_HOST
            - name: BOT_API_PORT
              valueFrom:
                configMapKeyRef:
                  name: gengar-dj-config
                  key: BOT_API_PORT
            - name: SILENCE_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: gengar-dj-config
                  key: SILENCE_THRESHOLD
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: gengar-dj-config
                  key: LOG_LEVEL
            - name: BOT_CALLBACK_URL
              value: "http://gengar-dj-bot.gengar-lab.svc.cluster.local:8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 15
            periodSeconds: 10
